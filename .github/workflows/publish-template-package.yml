name: Publish Template Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Optional package version. When supplied, it must match package.json."
        required: false
        type: string
      dist_tag:
        description: "npm dist-tag"
        required: true
        default: "latest"
        type: string
      create_tag:
        description: "Create and push topogram-template-todo-v<version> after publishing"
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: Publish template
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com
          scope: "@attebury"
      - name: Check release version
        env:
          EXPECTED_TEMPLATE_VERSION: ${{ inputs.version }}
        run: bash ./scripts/check-release-version.sh
      - name: Verify packed template
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run pack:check
      - name: Publish
        run: npm publish --tag "${{ inputs.dist_tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create release tag
        if: ${{ inputs.create_tag }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG="topogram-template-todo-v$VERSION"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Release tag already exists: $TAG" >&2
            exit 1
          fi
          git tag "$TAG"
          git push origin "$TAG"
